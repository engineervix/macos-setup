# =============================================================================
# AeroSpace config — mirrors Hyprland keybindings ($mainMod = alt)
# Docs: https://nikitabobko.github.io/AeroSpace/guide
# =============================================================================

config-version = 2

after-login-command = []
after-startup-command = [
    # SketchyBar detects if already running, so safe to always include
    'exec-and-forget sketchybar',
    # JankyBorders — config in ~/.config/borders/bordersrc
    'exec-and-forget borders',
]

# Notify SketchyBar when the active workspace changes
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

start-at-login = true

# Mouse warps to centre only when switching monitors (avoids disruptive mid-window teleport on keyboard nav)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Prevent accidentally hidden apps from disappearing behind tiled windows
automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

# Gaps mirror Hyprland: gaps_in = 5, gaps_out = 10
[gaps]
inner.horizontal = 10
inner.vertical   = 10
outer.left       = 10
outer.bottom     = 10
# Per-monitor top gap accounts for SketchyBar height (30px) + y_offset + breathing room:
#   built-in only:       0px y_offset + 30px bar + 10px breathing = 40
#   external/clamshell:  8px y_offset + 30px bar +  4px breathing = 42
# Tune EXTERNAL_Y_OFFSET / BUILTIN_Y_OFFSET in display_profile.sh to match.
outer.top        = [{ monitor."built-in" = 40 }, 42]
outer.right      = 10

# =============================================================================
# Main binding mode
# =============================================================================
[mode.main.binding]

# Suppress "hide application" — hits by accident constantly
cmd-h     = []
cmd-alt-h = []

# --- Launch & close ---
alt-q = 'exec-and-forget open -a Kitty'    # Super+Q → terminal
alt-c = 'close'                             # Super+C → kill window
alt-r = 'exec-and-forget osascript -e "tell application \"System Events\" to keystroke space using {command down}"'  # Super+R → Spotlight
alt-e = 'exec-and-forget open -a Finder'   # Super+E → file manager

# --- Screenshot to clipboard (mirrors Super+Print → grim -g slurp | wl-copy) ---
alt-shift-s = 'exec-and-forget screencapture -i -c'

# --- Layout ---
alt-v = 'layout floating tiling'           # Super+V → toggle float
alt-p = 'layout tiles horizontal vertical' # Super+P → cycle tile layout

# --- Focus ---
alt-h     = 'focus left'
alt-j     = 'focus down'
alt-k     = 'focus up'
alt-l     = 'focus right'
alt-down  = 'focus down'
alt-up    = 'focus up'

# --- Move windows ---
alt-shift-h     = 'move left'
alt-shift-j     = 'move down'
alt-shift-k     = 'move up'
alt-shift-l     = 'move right'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'

# --- Workspaces (alt+1-0) ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# --- Move window to workspace and follow (alt+shift+1-0) ---
alt-shift-1 = ['move-node-to-workspace 1',  'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2',  'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3',  'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4',  'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5',  'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6',  'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7',  'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8',  'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9',  'workspace 9']
alt-shift-0 = ['move-node-to-workspace 10', 'workspace 10']

# --- Workspace navigation ---
alt-tab       = 'workspace-back-and-forth'                     # Super+Tab → toggle last workspace
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next' # send workspace to next monitor

# --- Mode switches ---
alt-w               = 'mode resize'
alt-shift-semicolon = 'mode service'

# =============================================================================
# Resize mode — enter with alt-w, exit with enter/esc
# =============================================================================
[mode.resize.binding]
h     = 'resize width -50'
j     = 'resize height +50'
k     = 'resize height -50'
l     = 'resize width +50'
left  = 'resize width -50'
down  = 'resize height +50'
up    = 'resize height -50'
right = 'resize width +50'
minus = 'resize smart -50'
equal = 'resize smart +50'
enter = 'mode main'
esc   = 'mode main'

# =============================================================================
# Service mode — enter with alt-shift-;, exit with esc
# For less-common operations: reload config, reset layout, join windows
# =============================================================================
[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']          # reset layout
f         = ['layout floating tiling', 'mode main']          # toggle float
backspace = ['close-all-windows-but-current', 'mode main']
alt-shift-h = ['join-with left',  'mode main']
alt-shift-j = ['join-with down',  'mode main']
alt-shift-k = ['join-with up',    'mode main']
alt-shift-l = ['join-with right', 'mode main']

# =============================================================================
# App → workspace assignments (mirrors Hyprland rules.conf)
# =============================================================================

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.during-aerospace-startup = true
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
if.during-aerospace-startup = true
run = 'move-node-to-workspace 3'
