# =============================================================================
# lefthook.yml — git hooks for this repo
# Install once after cloning: lefthook install
# =============================================================================

pre-commit:
  commands:
    ggshield:
      run: ggshield secret scan pre-commit

    shellcheck:
      glob: "**/*.sh"
      exclude: "^_references/"
      run: shellcheck --severity=warning {staged_files}
