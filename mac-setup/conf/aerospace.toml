# =============================================================================
# AeroSpace config — mirrors Hyprland keybindings ($mainMod = alt)
# Docs: https://nikitabobko.github.io/AeroSpace/guide
# =============================================================================

after-login-command = []
after-startup-command = []

start-at-login = true

# Use alt as the main modifier (mirrors Super/Windows key on Linux)
[mode.main.binding]

# --- Launch & close ---
alt-q = 'exec-and-forget open -a Kitty'   # Super+Q → launch terminal
alt-c = 'close'                            # Super+C → kill active window

# --- Layout ---
alt-v = 'layout floating tiling'           # Super+V → toggle float
alt-p = 'layout tiles horizontal vertical' # Super+P → pseudo/cycle layout

# --- Focus ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-left  = 'focus left'
alt-down  = 'focus down'
alt-up    = 'focus up'
alt-right = 'focus right'

# --- Move windows ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
alt-shift-left  = 'move left'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'
alt-shift-right = 'move right'

# --- Workspaces (Super+1-0) ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# --- Move window to workspace (Super+Shift+1-0) ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# --- Workspace navigation ---
alt-tab = 'workspace-back-and-forth'       # Super+Tab → toggle last workspace

# --- Resize mode (Super+W) ---
alt-w = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
minus     = 'resize smart -50'
equal     = 'resize smart +50'
enter = 'mode main'
esc   = 'mode main'

# =============================================================================
# App → workspace assignments (mirrors Hyprland rules.conf)
# =============================================================================

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'
