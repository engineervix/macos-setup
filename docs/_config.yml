title: engineervix/macos-setup
description: Mac setup notes and cheatsheets
baseurl: "/macos-setup"
url: "https://engineervix.github.io"

permalink: pretty

color_scheme: dark

theme: just-the-docs

search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  rel_url: true
  button: false
  focus_shortcut_key: "k"

enable_copy_code_button: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/engineervix/macos-setup"
aux_links_new_tab: true

nav_enabled: true
nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

plugins:
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-sitemap

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - .jekyll-cache/
  - vendor/
